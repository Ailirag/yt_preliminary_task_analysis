# ===== LLM-провайдеры и роли моделей =====
# Роль указывается как "<провайдер>/<модель>". Переопределяется CLI: --analyst, --vision.
roles:
  analyst: zai/glm-5.2          # основной анализ (текст + инструменты)
  vision: zai/glm-4.6v          # разбор скриншотов из задач; none — выключить

limits:
  max_output_tokens: 8000
  request_timeout_s: 300
  retries: 3

providers:
  # --- z.ai (обычный тариф, оплата за токены): GLM-5.2 для анализа, GLM-4.6V для vision ---
  zai:
    kind: openai-compat
    base_url: "https://api.z.ai/api/paas/v4"           # обычный эндпоинт (pay-as-you-go) — активен
    # base_url: "https://api.z.ai/api/coding/paas/v4"   # подписочный (GLM Coding Plan) — без vision
    api_key_env: ZAI_API_KEY
    models:
      glm-5.2:     { tools: true, vision: false }
      glm-4.6v:    { tools: true, vision: true }
      glm-5-turbo: { tools: true, vision: false }
      glm-5:       { tools: true, vision: false }
      glm-4.7:     { tools: true, vision: false }

  yandex:
    kind: openai-compat
    base_url: "https://llm.api.cloud.yandex.net/v1"
    api_key_env: YANDEX_API_KEY
    # Имя модели собирается по шаблону; folder_id берётся из env YANDEX_FOLDER_ID
    model_uri_template: "gpt://{folder_id}/{model}"
    folder_id_env: YANDEX_FOLDER_ID
    models:
      yandexgpt:        { tools: true, vision: false }
      yandexgpt/latest: { tools: true, vision: false }
      # открытые модели Yandex AI Studio (folder — из YANDEX_FOLDER_ID; ID из консоли)
      "qwen3-235b-a22b-fp8/latest": { tools: true, vision: false }
      "qwen3.6-35b-a3b/latest":     { tools: true, vision: false }
      "deepseek-v4-flash/latest":   { tools: true, vision: false }
      "aliceai-llm/latest":         { tools: true, vision: false }
      "yandexgpt-5.1/latest":       { tools: true, vision: false }

  # Yandex через Responses API (ai.api.cloud.yandex.net): здесь модели РЕАЛЬНО вызывают
  # инструменты (в отличие от chat/completions). Для агентного анализа у Яндекса — этот провайдер.
  yandex-responses:
    kind: openai-responses
    base_url: "https://ai.api.cloud.yandex.net/v1"
    api_key_env: YANDEX_API_KEY
    model_uri_template: "gpt://{folder_id}/{model}"
    folder_id_env: YANDEX_FOLDER_ID
    models:
      "yandexgpt-5.1/latest":       { tools: true, vision: false }
      "aliceai-llm/latest":         { tools: true, vision: false }
      "deepseek-v4-flash/latest":   { tools: true, vision: false }
      "qwen3-235b-a22b-fp8/latest": { tools: true, vision: false }
      "qwen3.6-35b-a3b/latest":     { tools: true, vision: false }

  claude:
    kind: anthropic
    api_key_env: ANTHROPIC_API_KEY
    models:
      claude-opus-4-8: { tools: true, vision: true }
      claude-sonnet-5: { tools: true, vision: true }

  openai:
    kind: openai-compat
    base_url: "https://api.openai.com/v1"
    api_key_env: OPENAI_API_KEY
    models:
      gpt-5: { tools: true, vision: true }   # имя модели уточнить при подключении ключа
