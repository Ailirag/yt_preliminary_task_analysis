# ===== Основной конфиг ИИ-анализатора =====
queue: ONE
component_name: "ИИ анализ"

# dry-run | live. Запись в трекер идёт ТОЛЬКО при mode: live И флаге --live (двойной предохранитель).
mode: dry-run

bugs:
  # ПЕРЕКЛЮЧАТЕЛЬ отбора (переопределяется CLI --selection):
  #   no-done-tag  - все незакрытые ошибки без done_tag
  #   trigger-tag  - только ошибки с тегом trigger_tag (и без done_tag)
  selection: no-done-tag
  trigger_tag: "к_анализу_ии"
  done_tag: "ИИ_анализ_проведен"
  deferred_tag: "ИИ_отложено_лимит"   # ставится, когда задача отложена по лимиту; снимается демоном при смене суток
  # Кто имеет право запускать анализ тегом-триггером (только для selection: trigger-tag).
  # Пусто = любой. Иначе — только если тег добавил кто-то из списка.
  # Формат записи: e-mail (предпочтительно — резолвится в id активного пользователя
  # через справочник трекера, кеш в work/user_map.json), либо uid, либо ФИО. Без регистра.
  # Пример: ["garipov_ir@grandtrade.world"]  (или uid "8000000000000842")
  trigger_authors: []
  complexity_tags:
    simple: "ИИ-простая"
    complex: "ИИ-сложная"
  subtask:
    type: informationanalysis   # «Анализ информации» (ключ типа задачи в очереди ONE)
    summary_prefix: "[ИИ анализ] "
    unique_prefix: "ai-bug"

ft:
  trigger_tag: "К анализу ИИ"
  done_tag: "ИИ_анализ_ФТ_проведен"
  require_doc_link: true          # documentationLink пуст -> пропуск (тег не трогаем)
  complexity_tags:
    simple: "ИИ-простая"
    complex: "ИИ-сложная"
  subtask:
    type: informationanalysis   # «Анализ информации» (ключ типа задачи в очереди ONE)
    summary_prefix: "[ИИ анализ ФТ] "
    unique_prefix: "ai-ft"

# ===== Целевые системы 1С (мульти-воркспейс) =====
# ПУСТО (systems: []) = прежнее одно-воркспейсное поведение: минизапуск-гейт определения системы
# НЕ применяется, анализатор работает с onec.dump_path как раньше.
# Заполните, чтобы включить мульти-систему: перед анализом LLM-минизапуск по описанию+компонентам
# определит целевую систему(ы) -> воркспейс(ы) onec-lite и подставит workspace= в onec-вызовы;
# если систему определить нельзя — пишется no_system_comment и ставится skip_tag (задача пропускается).
# Из этого же списка генерируется state-файл onec-lite (uv run analyzer gen-workspaces): workspace -> repo|root.
systems: []
#  - name: "Управление Торговлей"     # человекочитаемо (подаётся в промпт минизапуска)
#    workspace: "ut"                  # имя воркспейса onec-lite (join-ключ; латиница/цифры/_/-/.)
#    repo: ""                         # git-URL зеркала (прод) — onec-lite склонирует в mirrors/ut
#    branch: "main"                   # ветка зеркала (пусто = дефолтная)
#    root: ""                         # ИЛИ локальный путь к выгрузке (dev/Windows); repo приоритетнее
#    components: ["УТ"]               # компоненты трекера (display), указывающие на эту систему
#    aliases: ["УТ", "ut", "торговля", "управление торговлей"]  # подсказки распознавания для LLM
#  - name: "ERP"
#    workspace: "erp"
#    repo: ""
#    components: ["ERP"]
#    aliases: ["ЕРП", "erp"]

# Тег для задач, где целевую систему определить нельзя (чтобы демон не перевыбирал их каждый тик).
skip_tag: "ИИ_анализ_невозможен"
# Комментарий в такую задачу (в dry-run — только в журнал writes.jsonl, без реальной записи).
no_system_comment: "Анализ невозможен: невозможно установить целевую систему анализа. Укажите систему 1С в описании задачи или добавьте компоненту, указывающую на систему."

# Резидентный демон: uv run analyzer watch (опрос трекера в цикле).
watch:
  interval_s: 30                 # период опроса; тик дешёвый (сначала count), тяжёлый стек — только при наличии кандидатов
  workflow: bugs                 # bugs | ft
  selection: trigger-tag         # для демона безопаснее реагировать на осознанно помеченные задачи
  profile: ""                    # профиль providers.yaml для демона (пусто = default_profile). Прод на Yandex: "yandex"
  daily_budget: null             # ОБЩИЙ потолок трат за сутки в валюте аналитика ($/₽); null = без лимита. Пример: 5.0
  per_author_daily_limit: 0      # макс. разборов на автора тега за сутки; 0 = без лимита. Пример: 5
  concurrency: 3                 # сколько задач разбирать ОДНОВРЕМЕННО (1..5; 1 = последовательно). Старт с 3, при упоре в лимиты API снизить
  work_hours: ""                 # окно работы "08:00-20:00" (локальное время); пусто = круглосуточно
  lock_file: "analyzer.lock"     # single-instance lock (в paths.work_dir)
  error_backoff_s: 60            # пауза после ошибки тика (экспоненциально до max_backoff_s)
  max_backoff_s: 900

limits:
  max_issues_per_run: 5
  max_images_per_issue: 8
  max_image_mb: 15
  max_wiki_pages_per_issue: 5
  max_tool_steps: 60              # бюджет агентного цикла (CLI --max-steps)
  max_comment_chars: 30000        # суммарное усечение комментариев
  max_wiki_chars: 40000           # усечение одной вики-страницы
  max_tool_result_chars: 20000    # усечение результата одного инструмента
  max_vision_calls_per_issue: 20  # потолок обращений к GLM-4.6V на один анализ (осн. задача + связанные)
  throttle_between_issues_s: 10
  max_consecutive_errors: 3

# Инструменты навигации аналитика (read-only): чтение других задач/поиск/вики прямо в агентском цикле.
navigation:
  enabled: true
  tools: [get_issue, search_issues, get_wiki]
  # Очереди, задачи которых агент может открывать. Пусто -> только текущая (queue).
  # Пример нескольких очередей: [ONE, BP, ZUP]. Голый номер в тексте агент трактует как текущую очередь.
  allowed_queues: []
  max_issue_chars: 6000           # усечение текста одной связанной задачи
  max_search_results: 10

onec:
  enabled: true
  vecgraph_dir: "vendor/onec-vecgraph"
  # Путь к выгрузке конфигурации 1С УТ (git-репозиторий с XML Конфигуратора).
  # ЗАДАТЬ ПЕРЕД ПЕРВЫМ ПРОГОНОМ. Ревизия попадает в отчёт.
  dump_path: ""
  # Команда запуска MCP-сервера onec-lite (stdio); {dump_path} подставляется из onec.dump_path.
  # --no-sync: venv вендора собран заранее (uv sync в образе/на машине) — не пересинхронизировать
  # на каждый спавн (в Docker иначе ломается о виндовый cache-dir вендора и требует сети).
  command: "uv"
  args: ["run", "--no-sync", "--directory", "{vecgraph_dir}", "onec-lite", "stdio", "--root", "{dump_path}"]
  env: {}                         # доп. переменные ONEC_LITE_* при необходимости
  # Белый список инструментов для LLM (пусто = все 29). Имена сняты с onec-lite.
  tool_whitelist:
    - overview          # обзор конфигурации
    - list_objects      # список/поиск объектов метаданных
    - search_metadata   # поиск по метаданным
    - get_object        # структура объекта (реквизиты, ТЧ, формы, модули)
    - get_form          # состав формы (для ошибок UI)
    - search_code       # поиск по коду
    - fts_search        # полнотекстовый поиск (BM25)
    - find_routine      # найти процедуру/функцию
    - read_routine      # прочитать процедуру
    - read_module       # прочитать модуль
    - find_callers      # кто вызывает (радиус поражения)
    - find_callees      # что вызывает
    - call_graph        # граф вызовов
    - find_overrides    # переопределения/расширения
    - find_handlers     # обработчики событий и подписки
    - writes_to         # движения: кто пишет в регистры
    - platform_docinfo  # справка платформы 1С
  start_timeout_s: 120
  call_timeout_s: 120

wiki:
  api: "https://api.wiki.yandex.net"
  allowed_hosts: ["wiki.yandex.ru"]
  doc_field: "documentationLink"

tracker:
  base_url: "https://api.tracker.yandex.net"
  token_env: "YATRACKER_TOKEN_GT"
  org_id_env: "YATRACKER_ORGID_GT"
  org_header: "X-Org-ID"          # организация Yandex 360

report:
  language: ru
  disclaimer: "⚠️ Автоматический предварительный ИИ-анализ. Не является финальным вердиктом — требует проверки разработчиком."

paths:
  work_dir: "work"
  journal_dir: "journal"
