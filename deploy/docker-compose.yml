# Разворот ИИ-анализатора одним контейнером.
# ВАЖНО (эта машина): Docker общий (рядом крутятся infinity/qdrant) — демон/ data-root НЕ трогаем.
# Все данные — bind-маунтами на большой диск /mnt/storage (на / только образ ~1 ГБ).
# Контейнер работает под uid 10001 (пользователь app из образа), поэтому каталоги под запись
# должны принадлежать 10001 (см. deploy/README.md, раздел про подготовку каталогов).
services:
  analyzer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      # ВАЖНО: перед сборкой склонируйте onec-vecgraph в vendor/ (он в .gitignore, в клоне его нет):
      #   git clone --depth 1 https://github.com/Ailirag/onec-vecgraph vendor/onec-vecgraph
      # иначе build упадёт на `uv sync --directory vendor/onec-vecgraph`. См. deploy/README.md.
    image: tracker-analyzer:latest
    container_name: tracker-analyzer
    init: true                       # tini как PID 1: пробрасывает SIGTERM, собирает зомби
    restart: unless-stopped
    stop_grace_period: 600s          # docker stop шлёт SIGTERM -> демон доигрывает текущий разбор (~7 мин) и снимает лок
    env_file:
      # СЕКРЕТЫ (не в git): YATRACKER_TOKEN_GT, YATRACKER_ORGID_GT; ZAI_API_KEY и/или YANDEX_API_KEY+YANDEX_FOLDER_ID (LLM);
      # CORP_GIT_CREDENTIALS — строка git credential-store (https://user:token@git.corp…) для клона приватных зеркал 1С.
      - /home/adm_garipov_ir/analyzer.env
    environment:
      TZ: "Europe/Moscow"            # сутки лимитов/бюджета (сброс в полночь) и метки времени в логах — по МСК
    #  HTTP_PROXY: "http://proxy.local:3128"   # добавьте сюда, если исходящий доступ только через прокси
    #  HTTPS_PROXY: "http://proxy.local:3128"
    #  NO_PROXY: "localhost,127.0.0.1,github.com"
    ports:
      # read-only веб-страница статуса демона (watch.status_port). Публикуется ТОЛЬКО на localhost хоста —
      # доступ снаружи через SSH-туннель:  ssh -L 8020:127.0.0.1:8020 <хост>  ->  http://localhost:8020
      - "127.0.0.1:8020:8020"
    volumes:
      # прод-конфиг: копия config/analyzer.yaml (мульти-система: systems заполнен, onec.dump_path: "").
      - /home/adm_garipov_ir/analyzer/config/analyzer.yaml:/app/config/analyzer.yaml:ro
      # providers.yaml (профили/модели/тарифы) — внешним файлом, чтобы правки не требовали пересборки.
      - /home/adm_garipov_ir/analyzer/config/providers.yaml:/app/config/providers.yaml:ro
      # FTS-индекс + зеркала систем (~ГБ) — переживают пересоздание контейнера (владелец 10001).
      - /mnt/storage/analyzer/onec-lite:/data/onec-lite
      # операционное состояние и данные компании (владелец 10001).
      - /mnt/storage/analyzer/work:/app/work
      - /mnt/storage/analyzer/journal:/app/journal
    # МУЛЬТИ-СИСТЕМА: entrypoint генерирует state-файл из config.systems, клонирует зеркала в
    # /data/onec-lite/mirrors и строит FTS по каждому воркспейсу. Одиночный дамп /data/dump НЕ монтируется.
    # (Для одиночного режима — systems: [] + вернуть маунт /mnt/storage/analyzer/dump:/data/dump:ro.)

  # Плановое обновление зеркал 1С (только для мульти-системы): отдельный процесс onec-lite sync.
  # Держит рабочие копии свежими; FTS НЕ строит — обслуживающий onec-lite внутри analyzer сам
  # дообновляет индекс по mtime. При пустом config.systems сервис не нужен (idle: «нет воркспейсов»).
  onec-sync:
    image: tracker-analyzer:latest
    container_name: tracker-onec-sync
    init: true
    restart: unless-stopped
    depends_on:
      - analyzer                     # порядок старта: analyzer делает первичный клон+FTS (не готовность)
    # Тот же образ и ENTRYPOINT (entrypoint.sh): первый аргумент `sync` включает роль сайдкара
    # (entrypoint настроит git-креды из CORP_GIT_CREDENTIALS и запустит onec-lite sync).
    # --at HH:MM обновляет в заданные часы (в окна низкой активности) — чтобы pull не менял код под ногами
    # агента посреди разбора. TZ=Europe/Moscow (ниже) => часы трактуются как МСК (в образе есть tzdata).
    # Альтернатива по интервалу: command: ["sync", "--interval", "21600", "--pull"].
    command: ["sync", "--at", "23:00", "--at", "00:00", "--at", "01:00", "--at", "08:00", "--pull"]
    environment:
      TZ: "Europe/Moscow"          # часы --at считаются по московскому времени
    env_file:
      - /home/adm_garipov_ir/analyzer.env   # ONEC_LITE_STATE (из образа) + CORP_GIT_CREDENTIALS для приватных зеркал
    volumes:
      # тот же том, что у analyzer: state-файл (config.json), зеркала (mirrors/) и FTS.
      - /mnt/storage/analyzer/onec-lite:/data/onec-lite
